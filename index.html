<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Content-Security-Policy fallback for hosts that don't honor public/_headers.
         Keep in sync with the CSP in public/_headers (minus frame-ancestors, which
         a meta tag cannot express — that stays header-only for clickjacking defense). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://mistdeyttbkqrxcvnrlp.supabase.co wss://mistdeyttbkqrxcvnrlp.supabase.co; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BCUTZ - Book Your Perfect Cut</title>
    <meta name="description" content="BCUTZ - The modern way to find and book the best barbers near you. Premium haircuts, zero hassle.">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BCUTZ" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://bcutz.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bcutz.com/" />
    <meta property="og:site_name" content="BCUTZ" />
    <meta property="og:locale" content="de_CH" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:image" content="https://bcutz.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bcutz" />
    <meta name="twitter:url" content="https://bcutz.com/" />
    <meta name="twitter:image" content="https://bcutz.com/og-image.png" />
    <meta name="twitter:title" content="BCUTZ - Book Your Perfect Cut" />
    <meta name="twitter:description" content="BCUTZ - The modern way to find and book the best barbers near you. Premium haircuts, zero hassle." />

    <!-- Search Console verification placeholders — replace tokens before deploy -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_TOKEN" /> -->

    <!-- JSON-LD: Organization + WebSite (boosts SEO rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://bcutz.com/#organization",
          "name": "BCUTZ",
          "url": "https://bcutz.com/",
          "logo": "https://bcutz.com/og-image.png",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://bcutz.com/#website",
          "url": "https://bcutz.com/",
          "name": "BCUTZ",
          "publisher": { "@id": "https://bcutz.com/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://bcutz.com/barbers?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

<body style="background-color: #050505; color: #fafafa; min-height: 100vh;">
